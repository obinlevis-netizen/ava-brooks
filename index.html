<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ava Brooks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8F0;
    --ink:#2B1B2F;
    --magenta:#FF3D7F;
    --coral:#FF8A4C;
    --lime:#C8FF4D;
    --white:#FFFFFF;
    --shadow-hard: 6px 6px 0px rgba(43,27,47,0.95);
    --shadow-soft: 0 14px 30px rgba(43,27,47,0.18);
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body{
    margin:0;
    background:var(--cream);
    background-image:
      radial-gradient(circle at 10% 5%, rgba(255,61,127,0.12) 0%, transparent 45%),
      radial-gradient(circle at 90% 85%, rgba(255,138,76,0.14) 0%, transparent 50%);
    font-family:'Plus Jakarta Sans', sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }

  .page{
    width:100%;
    max-width:460px;
    padding:28px 20px 50px;
  }

  /* ---------- Eyebrow / handle ---------- */
  .eyebrow{
    text-align:center;
    margin-bottom:18px;
  }
  .eyebrow .handle{
    display:inline-block;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:14px;
    letter-spacing:0.04em;
    background:var(--ink);
    color:var(--lime);
    padding:6px 16px;
    border-radius:999px;
    transform:rotate(-2deg);
  }

  /* ---------- Rangée d'icônes (au-dessus de la photo) ---------- */
  .icon-row{
    display:flex;
    justify-content:center;
    gap:14px;
    margin:24px 0 6px;
  }
  .icon-circle{
    width:46px;
    height:46px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    border:3px solid var(--ink);
    box-shadow:3px 3px 0px rgba(43,27,47,0.95);
    text-decoration:none;
    transition:transform 0.15s ease;
  }
  .icon-circle svg{
    width:22px;
    height:22px;
    fill:currentColor;
  }
  .icon-circle:hover{ transform:translateY(-2px) scale(1.05); }
  .icon-circle:active{ transform:translateY(1px) scale(0.97); }
  .icon-circle.icon-ig{ background:linear-gradient(135deg, var(--magenta), var(--coral)); color:var(--white); }
  .icon-circle.icon-tt{ background:var(--ink); color:var(--lime); }

  /* ---------- Hero : photo portrait cliquable ---------- */
  .hero-link{
    display:block;
    position:relative;
    border-radius:28px;
    overflow:hidden;
    border:4px solid var(--ink);
    box-shadow:var(--shadow-hard);
    aspect-ratio: 4 / 5;
    text-decoration:none;
    color:inherit;
  }

  .hero-photo{
    width:100%;
    height:100%;
    background-image: url('portrait.jpg');
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .placeholder-tag{
    background:rgba(255,255,255,0.92);
    border:2px dashed var(--ink);
    border-radius:16px;
    padding:14px 18px;
    text-align:center;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:13px;
    line-height:1.4;
    max-width:78%;
  }

  .hero-overlay{
    position:absolute;
    inset:0;
    background:
      linear-gradient(180deg, rgba(20,8,16,0.15) 0%, rgba(20,8,16,0.1) 40%, rgba(20,8,16,0.75) 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    text-align:center;
    padding:0 18px 24px;
  }

  .name-sticker{
    color:var(--white);
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:34px;
    text-shadow:0 3px 14px rgba(0,0,0,0.55);
    margin:0;
  }

  .tagline{
    color:var(--white);
    font-size:14px;
    font-weight:500;
    margin:0;
    opacity:0.95;
    text-shadow:0 2px 8px rgba(0,0,0,0.4);
  }

  .cta-sticker{
    position:absolute;
    bottom:18px;
    right:18px;
    background:var(--lime);
    color:var(--ink);
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:15px;
    padding:12px 22px;
    border-radius:999px;
    transform:rotate(3deg);
    box-shadow:4px 4px 0px rgba(0,0,0,0.3);
    transition:transform 0.15s ease;
  }
  .hero-link:hover .cta-sticker{ transform:rotate(0deg) scale(1.04); }
  .hero-link:active .cta-sticker{ transform:rotate(0deg) scale(0.97); }

  /* ---------- Bandeau / divider ---------- */
  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    margin:0 4px 18px;
  }
  .divider span{
    font-family:'Fredoka', sans-serif;
    font-size:13px;
    font-weight:600;
    color:var(--magenta);
    white-space:nowrap;
  }
  .divider::before, .divider::after{
    content:"";
    flex:1;
    height:2px;
    background:repeating-linear-gradient(90deg, var(--ink) 0, var(--ink) 6px, transparent 6px, transparent 12px);
    opacity:0.35;
  }

  /* ---------- Photo paysage (VIP / OF) ---------- */
  .vip-link{
    display:block;
    position:relative;
    border-radius:24px;
    overflow:hidden;
    border:4px solid var(--ink);
    box-shadow:var(--shadow-hard);
    aspect-ratio: 16 / 10;
    text-decoration:none;
  }

  .vip-photo{
    width:100%;
    height:100%;
    background-image: url('paysage.jpg');
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .vip-badge{
    position:absolute;
    top:14px;
    left:14px;
    background:var(--ink);
    color:var(--lime);
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:12px;
    letter-spacing:0.05em;
    padding:6px 12px;
    border-radius:999px;
    transform:rotate(-2deg);
  }

  .vip-overlay{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:16px;
    background:linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(20,8,16,0.75) 100%);
  }

  .vip-title{
    color:var(--white);
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:19px;
    margin:0 0 2px;
  }
  .vip-text{
    color:rgba(255,255,255,0.9);
    font-size:13px;
    margin:0;
  }

  /* ---------- Footer ---------- */
  footer{
    text-align:center;
    margin-top:36px;
    font-size:12px;
    color:#9c8a9f;
  }

  @media (prefers-reduced-motion: reduce){
    .icon-circle, .cta-sticker{ transition:none; }
  }
</style>
